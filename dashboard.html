<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Лудо Приключение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background: #0a0e27;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .fog-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(30, 60, 180, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(60, 30, 180, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(20, 100, 200, 0.2) 0%, transparent 50%),
                linear-gradient(180deg, #0a0e27 0%, #1a1a4e 50%, #0a0e27 100%);
        }
        
        .fog-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .fog-layer::before,
        .fog-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 60%, rgba(100, 150, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 40%, rgba(80, 120, 255, 0.06) 0%, transparent 50%);
            animation: fogMove 20s ease-in-out infinite alternate;
        }
        
        .fog-layer::after {
            background: 
                radial-gradient(ellipse at 50% 80%, rgba(60, 100, 255, 0.05) 0%, transparent 40%);
            animation-duration: 25s;
            animation-direction: alternate-reverse;
        }
        
        @keyframes fogMove {
            0% { transform: translateX(-5%) scale(1); opacity: 0.6; }
            100% { transform: translateX(5%) scale(1.1); opacity: 1; }
        }
        
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        .dashboard-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }
        
        /* ===== ПРОФИЛЬ (справа вверху) ===== */
        .header {
            display: flex;
            justify-content: flex-end;
            padding: 10px 0;
            margin-bottom: 30px;
        }
        
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .profile-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .profile-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff2d55, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
            font-weight: 700;
        }
        
        .profile-name {
            font-weight: 600;
        }
        
        .profile-balance {
            color: #ffd700;
            font-weight: 700;
        }
        
        .welcome-text {
            font-size: clamp(24px, 3vw, 36px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(100, 150, 255, 0.2);
            margin-bottom: 30px;
        }
        
        .coming-soon {
            padding: 40px;
            border: 2px dashed rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 480px) {
            .dashboard-container {
                padding: 20px;
            }
            
            .profile-btn {
                padding: 8px 14px;
                font-size: 12px;
            }
            
            .profile-icon {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            
            .profile-balance {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="fog-bg"></div>
    <div class="fog-layer"></div>
    <div class="stars" id="stars"></div>
    
    <div class="dashboard-container" id="dashboard">
        <!-- Шапка с профилем -->
        <div class="header">
            <button class="profile-btn" onclick="goToProfile()">
                <div class="profile-icon" id="profileIcon">🤠</div>
                <span class="profile-name" id="profileName">Игрок</span>
                <span class="profile-balance">💰 <span id="headerBalance">1000</span></span>
            </button>
        </div>
        
        <h1 class="welcome-text">
            Добро пожаловать в ЛУДО! 🎰
        </h1>
        
        <div class="coming-soon">
            ⏳ Скоро здесь появится игра...
        </div>
    </div>
    
    <script>
        // ============================================================
        // 1. ЗВЁЗДЫ
        // ============================================================
        (function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (1 + Math.random() * 2) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (2 + Math.random() * 4) + 's';
                container.appendChild(star);
            }
        })();
        
        // ============================================================
        // 2. ПРОВЕРКА АВТОРИЗАЦИИ
        // ============================================================
        const username = localStorage.getItem('current_user');
        const balance = localStorage.getItem('user_balance') || 1000;
        
        if (!username) {
            window.location.href = 'index.html';
        }
        
        // Отображаем данные
        document.getElementById('profileName').textContent = username;
        document.getElementById('profileIcon').textContent = username.charAt(0).toUpperCase();
        document.getElementById('headerBalance').textContent = balance;
        
        // ============================================================
        // 3. ПЕРЕХОД В ПРОФИЛЬ
        // ============================================================
        function goToProfile() {
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
