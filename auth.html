<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход / Регистрация</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background: #0a0e27;
            overflow: hidden;
        }
        
        .fog-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(30, 60, 180, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(60, 30, 180, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(20, 100, 200, 0.2) 0%, transparent 50%),
                linear-gradient(180deg, #0a0e27 0%, #1a1a4e 50%, #0a0e27 100%);
        }
        
        .fog-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .fog-layer::before,
        .fog-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 60%, rgba(100, 150, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 40%, rgba(80, 120, 255, 0.06) 0%, transparent 50%);
            animation: fogMove 20s ease-in-out infinite alternate;
        }
        
        .fog-layer::after {
            background: 
                radial-gradient(ellipse at 50% 80%, rgba(60, 100, 255, 0.05) 0%, transparent 40%);
            animation-duration: 25s;
            animation-direction: alternate-reverse;
        }
        
        @keyframes fogMove {
            0% { transform: translateX(-5%) scale(1); opacity: 0.6; }
            100% { transform: translateX(5%) scale(1.1); opacity: 1; }
        }
        
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        .auth-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }
        
        .auth-title {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(100, 150, 255, 0.2);
        }
        
        .auth-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 5px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .auth-tab.active {
            background: linear-gradient(145deg, #ff2d55, #ff6b6b);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 45, 85, 0.3);
        }
        
        .auth-tab:hover:not(.active) {
            color: #fff;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        
        .form-group input:focus {
            border-color: #ff2d55;
            box-shadow: 0 0 20px rgba(255, 45, 85, 0.15);
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(145deg, #ff2d55, #ff6b6b);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            box-shadow: 0 0 30px rgba(255, 45, 85, 0.2);
        }
        
        .auth-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(255, 45, 85, 0.3);
        }
        
        .auth-btn:active {
            transform: scale(0.98);
        }
        
        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-error {
            background: rgba(255, 45, 85, 0.15);
            border: 1px solid rgba(255, 45, 85, 0.2);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        
        .auth-error.show {
            display: block;
        }
        
        .auth-success {
            background: rgba(46, 213, 115, 0.15);
            border: 1px solid rgba(46, 213, 115, 0.2);
            color: #2ed573;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        
        .auth-success.show {
            display: block;
        }
        
        .back-link {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 14px;
            margin-top: 20px;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="fog-bg"></div>
    <div class="fog-layer"></div>
    <div class="stars" id="stars"></div>
    
    <div class="auth-container">
        <h1 class="auth-title">🎰 ЛУДО</h1>
        <p class="auth-subtitle">Войди или создай аккаунт</p>
        
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Вход</button>
            <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
        </div>
        
        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess"></div>
        
        <!-- Форма входа -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Никнейм</label>
                <input type="text" id="loginUsername" placeholder="Введите никнейм" required />
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="Введите пароль" required />
            </div>
            <button type="submit" class="auth-btn" id="loginBtn">Войти</button>
        </form>
        
        <!-- Форма регистрации -->
        <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
            <div class="form-group">
                <label>Придумайте никнейм</label>
                <input type="text" id="regUsername" placeholder="Например: KILLER228" required />
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="regPassword" placeholder="Минимум 6 символов" required minlength="6" />
            </div>
            <div class="form-group">
                <label>Подтвердите пароль</label>
                <input type="password" id="regConfirmPassword" placeholder="Повторите пароль" required />
            </div>
            <button type="submit" class="auth-btn" id="registerBtn">Зарегистрироваться</button>
        </form>
        
        <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>
    
    <script>
        // ============================================================
        // 1. НАСТРОЙКИ SUPABASE
        // ============================================================
        const SUPABASE_URL = 'https://xzraipvexmgxmixjrkdj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_UHM3a7u9rKD-_KS6n5fBUw_4zBHqaAh';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================================
        // 2. ЗВЕЗДЫ
        // ============================================================
        (function createStars() {
            const container = document.getElementById('stars');
            if (!container) return;
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (1 + Math.random() * 2) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (2 + Math.random() * 4) + 's';
                container.appendChild(star);
            }
        })();
        
        // ============================================================
        // 3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function showError(message) {
            const el = document.getElementById('authError');
            document.getElementById('authSuccess').classList.remove('show');
            el.textContent = message;
            el.classList.add('show');
        }
        
        function showSuccess(message) {
            const el = document.getElementById('authSuccess');
            document.getElementById('authError').classList.remove('show');
            el.textContent = message;
            el.classList.add('show');
        }
        
        function hideMessages() {
            document.getElementById('authError').classList.remove('show');
            document.getElementById('authSuccess').classList.remove('show');
        }
        
        // ============================================================
        // 4. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================================
        function switchTab(tab) {
            hideMessages();
            
            const tabs = document.querySelectorAll('.auth-tab');
            tabs.forEach(el => el.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }
        
        // ============================================================
        // 5. РЕГИСТРАЦИЯ (БЕЗ EMAIL!)
        // ============================================================
        async function handleRegister(event) {
            event.preventDefault();
            hideMessages();
            
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // Проверки
            if (!username) {
                showError('❌ Введите никнейм');
                return;
            }
            
            if (username.length < 3) {
                showError('❌ Никнейм должен быть минимум 3 символа');
                return;
            }
            
            if (password.length < 6) {
                showError('❌ Пароль должен быть минимум 6 символов');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('❌ Пароли не совпадают');
                return;
            }
            
            // Генерируем фейковый email на основе ника + рандомный суффикс
            const fakeEmail = username.toLowerCase() + '_' + Math.random().toString(36).substring(2, 6) + '@ludo.game';
            
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Регистрация...';
            
            try {
                // Регистрация в Supabase Auth с фейковым email
                const { data, error } = await supabaseClient.auth.signUp({
                    email: fakeEmail,
                    password: password,
                    options: {
                        data: {
                            username: username
                        }
                    }
                });
                
                if (error) {
                    if (error.message.includes('User already registered')) {
                        throw new Error('❌ Пользователь с таким никнеймом уже существует');
                    }
                    if (error.message.includes('email')) {
                        throw new Error('❌ Ошибка с email. Попробуйте другой никнейм');
                    }
                    throw new Error('❌ ' + error.message);
                }
                
                if (!data.user) {
                    throw new Error('❌ Ошибка при создании пользователя');
                }
                
                // Добавляем запись в таблицу users
                const { error: insertError } = await supabaseClient
                    .from('users')
                    .insert({
                        id: data.user.id,
                        username: username
                    });
                
                if (insertError) {
                    console.warn('Ошибка вставки в users:', insertError);
                }
                
                showSuccess('✅ Регистрация успешна! Теперь войдите в аккаунт.');
                
                // Очищаем форму и переключаем на вход
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirmPassword').value = '';
                
                setTimeout(() => {
                    switchTab('login');
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = '';
                    hideMessages();
                }, 1500);
                
            } catch (error) {
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Зарегистрироваться';
            }
        }
        
        // ============================================================
        // 6. ВХОД
        // ============================================================
        async function handleLogin(event) {
            event.preventDefault();
            hideMessages();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showError('❌ Введите никнейм и пароль');
                return;
            }
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Вход...';
            
            try {
                // Получаем всех пользователей, чтобы найти email по нику
                const { data: users, error: fetchError } = await supabaseClient
                    .from('users')
                    .select('id, username')
                    .eq('username', username);
                
                if (fetchError || !users || users.length === 0) {
                    throw new Error('❌ Пользователь не найден');
                }
                
                // Получаем email из auth.users через RPC или просто пробуем войти
                // Самый простой способ: пытаемся войти через email = username@temp.local
                // Но поскольку при регистрации email был фейковый, его надо запомнить
                // Вместо этого используем другой подход
                
                // Вариант: ищем пользователя в auth.users по метаданным
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: username.toLowerCase() + '@ludo.game',
                    password: password
                });
                
                // Если не получилось с @ludo.game, пробуем @temp.local
                if (authError) {
                    const { data: authData2, error: authError2 } = await supabaseClient.auth.signInWithPassword({
                        email: username.toLowerCase() + '@temp.local',
                        password: password
                    });
                    
                    if (authError2) {
                        if (authError2.message.includes('Invalid login credentials')) {
                            throw new Error('❌ Неверный никнейм или пароль');
                        }
                        throw new Error('❌ ' + authError2.message);
                    }
                    
                    if (!authData2.user) {
                        throw new Error('❌ Ошибка входа');
                    }
                    
                    // Сохраняем сессию
                    localStorage.setItem('supabase_session', JSON.stringify(authData2.session));
                    localStorage.setItem('current_user', username);
                    
                    window.location.href = 'dashboard.html';
                    return;
                }
                
                if (!authData.user) {
                    throw new Error('❌ Ошибка входа');
                }
                
                // Сохраняем сессию
                localStorage.setItem('supabase_session', JSON.stringify(authData.session));
                localStorage.setItem('current_user', username);
                
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }
        
        // ============================================================
        // 7. ПРОВЕРКА АВТОРИЗАЦИИ
        // ============================================================
        async function checkAuth() {
            try {
                const { data, error } = await supabaseClient.auth.getUser();
                if (data?.user) {
                    window.location.href = 'dashboard.html';
                }
            } catch (e) {
                // Не авторизованы
            }
        }
        // checkAuth();
    </script>
</body>
</html>
