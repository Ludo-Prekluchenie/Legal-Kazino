<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Лудо Приключение</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', 'Impact', sans-serif;
            background: #0a0e27;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .fog-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(30, 60, 180, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(60, 30, 180, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(20, 100, 200, 0.2) 0%, transparent 50%),
                linear-gradient(180deg, #0a0e27 0%, #1a1a4e 50%, #0a0e27 100%);
        }
        
        .fog-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .fog-layer::before,
        .fog-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 60%, rgba(100, 150, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 40%, rgba(80, 120, 255, 0.06) 0%, transparent 50%);
            animation: fogMove 20s ease-in-out infinite alternate;
        }
        
        .fog-layer::after {
            background: 
                radial-gradient(ellipse at 50% 80%, rgba(60, 100, 255, 0.05) 0%, transparent 40%);
            animation-duration: 25s;
            animation-direction: alternate-reverse;
        }
        
        @keyframes fogMove {
            0% { transform: translateX(-5%) scale(1); opacity: 0.6; }
            100% { transform: translateX(5%) scale(1.1); opacity: 1; }
        }
        
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        /* ===== ЗАГРУЗОЧНЫЙ ЭКРАН ===== */
        .loader-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a0e27;
            transition: opacity 1s ease;
        }
        
        .loader-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top: 4px solid #ff2d55;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 22px;
            margin-top: 30px;
            letter-spacing: 3px;
            font-family: 'Arial', sans-serif;
            font-weight: 300;
        }
        
        .loader-progress {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }
        
        .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff2d55, #ff6b6b);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
        }
        
        .start-btn {
            position: relative;
            padding: 25px 60px;
            font-size: clamp(20px, 3vw, 32px);
            font-weight: 900;
            color: #fff;
            background: linear-gradient(145deg, #ff2d55, #ff6b6b, #ff2d55);
            background-size: 200% 200%;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: transform 0.3s, box-shadow 0.3s, opacity 0.5s;
            animation: btnPulse 2s ease-in-out infinite;
            box-shadow: 
                0 0 40px rgba(255, 45, 85, 0.3),
                0 0 80px rgba(255, 45, 85, 0.15),
                inset 0 2px 0 rgba(255, 255, 255, 0.2);
            opacity: 0;
            pointer-events: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .start-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .start-btn::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 63px;
            background: linear-gradient(145deg, #ff2d55, #ff6b6b, #ff2d55);
            background-size: 200% 200%;
            z-index: -1;
            filter: blur(20px);
            opacity: 0.6;
            animation: btnPulse 2s ease-in-out infinite;
        }
        
        .start-btn:hover {
            transform: scale(1.08);
            box-shadow: 
                0 0 60px rgba(255, 45, 85, 0.5),
                0 0 120px rgba(255, 45, 85, 0.25),
                inset 0 2px 0 rgba(255, 255, 255, 0.3);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        @keyframes btnPulse {
            0%, 100% {
                background-position: 0% 50%;
                box-shadow: 0 0 40px rgba(255, 45, 85, 0.3), 0 0 80px rgba(255, 45, 85, 0.15);
            }
            50% {
                background-position: 100% 50%;
                box-shadow: 0 0 60px rgba(255, 45, 85, 0.5), 0 0 120px rgba(255, 45, 85, 0.25);
            }
        }
        
        /* ===== АВТОРИЗАЦИЯ ===== */
        .auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
            padding: 20px;
        }
        
        .auth-overlay.active {
            display: flex;
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .auth-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        .close-auth {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .close-auth:hover {
            color: #fff;
        }
        
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 5px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            -webkit-tap-highlight-color: transparent;
        }
        
        .auth-tab.active {
            background: linear-gradient(145deg, #ff2d55, #ff6b6b);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 45, 85, 0.3);
        }
        
        .auth-tab:hover:not(.active) {
            color: #fff;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            -webkit-appearance: none;
        }
        
        .form-group input:focus {
            border-color: #ff2d55;
            box-shadow: 0 0 20px rgba(255, 45, 85, 0.15);
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(145deg, #ff2d55, #ff6b6b);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            box-shadow: 0 0 30px rgba(255, 45, 85, 0.2);
            -webkit-tap-highlight-color: transparent;
        }
        
        .auth-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(255, 45, 85, 0.3);
        }
        
        .auth-btn:active {
            transform: scale(0.98);
        }
        
        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-error {
            background: rgba(255, 45, 85, 0.15);
            border: 1px solid rgba(255, 45, 85, 0.2);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        
        .auth-error.show {
            display: block;
        }
        
        .auth-success {
            background: rgba(46, 213, 115, 0.15);
            border: 1px solid rgba(46, 213, 115, 0.2);
            color: #2ed573;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        
        .auth-success.show {
            display: block;
        }
        
        /* ===== DASHBOARD ===== */
        .dashboard-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .dashboard-container.active {
            display: block;
        }
        
        .welcome-text {
            font-size: clamp(28px, 4vw, 48px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(100, 150, 255, 0.2);
            margin-bottom: 10px;
        }
        
        .user-name {
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 45, 85, 0.3);
        }
        
        .user-balance {
            color: #ffd700;
            font-size: 24px;
            margin: 15px 0;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }
        
        .sub-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .logout-btn {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .logout-btn:hover {
            background: rgba(255, 45, 85, 0.2);
            border-color: #ff2d55;
            color: #ff6b6b;
        }
        
        .coming-soon {
            margin-top: 40px;
            padding: 30px;
            border: 2px dashed rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        /* ===== МОБИЛЬНАЯ АДАПТАЦИЯ ===== */
        @media (max-width: 480px) {
            .auth-container {
                padding: 30px 20px;
                border-radius: 20px;
            }
            
            .start-btn {
                padding: 18px 30px;
                font-size: 18px;
                letter-spacing: 2px;
            }
            
            .loader-text {
                font-size: 18px;
            }
            
            .loader-spinner {
                width: 50px;
                height: 50px;
                border-width: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="fog-bg"></div>
    <div class="fog-layer"></div>
    <div class="stars" id="stars"></div>
    
    <!-- ===== ЗАГРУЗОЧНЫЙ ЭКРАН ===== -->
    <div class="loader-overlay" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Загрузка сайта...</div>
        <div class="loader-progress">
            <div class="loader-progress-bar" id="progressBar"></div>
        </div>
    </div>
    
    <!-- ===== ОСНОВНОЙ ЭКРАН ===== -->
    <div class="main-container" id="mainContent">
        <button class="start-btn" id="startBtn" onclick="openAuth()">
            Начать лудо приключение
        </button>
    </div>
    
    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-container">
            <button class="close-auth" onclick="closeAuth()">✕</button>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Вход</button>
                <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
            </div>
            
            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="Никнейм" required />
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Пароль" required />
                </div>
                <button type="submit" class="auth-btn" id="loginBtn">Войти</button>
            </form>
            
            <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
                <div class="form-group">
                    <input type="text" id="regUsername" placeholder="Никнейм" required />
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" placeholder="Пароль" required minlength="6" />
                </div>
                <div class="form-group">
                    <input type="password" id="regConfirmPassword" placeholder="Подтвердите пароль" required />
                </div>
                <button type="submit" class="auth-btn" id="registerBtn">Зарегистрироваться</button>
            </form>
        </div>
    </div>
    
    <!-- ===== DASHBOARD ===== -->
    <div class="dashboard-container" id="dashboard">
        <h1 class="welcome-text">
            Добро пожаловать, <span class="user-name" id="username">Игрок</span>! 🎰
        </h1>
        <div class="user-balance">💰 Баланс: <span id="balance">1000</span> ₴</div>
        <p class="sub-text">Вы успешно вошли в систему</p>
        
        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
        
        <div class="coming-soon">
            ⏳ Скоро здесь появится игра...
        </div>
    </div>
    
    <script>
        // ============================================================
        // 1. ЗВЕЗДЫ
        // ============================================================
        (function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (1 + Math.random() * 2) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (2 + Math.random() * 4) + 's';
                container.appendChild(star);
            }
        })();
        
        // ============================================================
        // 2. МУЗЫКА + ЗАГРУЗКА (С ТАЙМАУТОМ ДЛЯ МОБИЛЬНЫХ)
        // ============================================================
        const audio = new Audio('voice.m4a');
        audio.loop = true;
        audio.volume = 0.3;
        
        let musicLoaded = false;
        let progress = 0;
        let loaderHidden = false;
        const progressBar = document.getElementById('progressBar');
        const loader = document.getElementById('loader');
        const startBtn = document.getElementById('startBtn');
        
        // Функция показа кнопки
        function showButton() {
            if (loaderHidden) return;
            loaderHidden = true;
            
            // Если музыка не загрузилась, но прошло 3 секунды - всё равно показываем кнопку
            progressBar.style.width = '100%';
            
            setTimeout(() => {
                loader.classList.add('hidden');
                startBtn.classList.add('visible');
                
                // Пытаемся запустить музыку
                audio.play().catch(() => {});
            }, 300);
        }
        
        // Таймаут для мобильных - через 3 секунды показываем кнопку в любом случае
        const timeoutId = setTimeout(showButton, 3000);
        
        // Отслеживаем загрузку
        audio.addEventListener('progress', () => {
            if (audio.buffered.length > 0) {
                const buffered = audio.buffered.end(0);
                const duration = audio.duration || 1;
                progress = Math.min((buffered / duration) * 100, 100);
                progressBar.style.width = progress + '%';
            }
        });
        
        audio.addEventListener('canplaythrough', () => {
            musicLoaded = true;
            progressBar.style.width = '100%';
            
            // Если кнопка ещё не показана - показываем
            if (!loaderHidden) {
                clearTimeout(timeoutId);
                showButton();
            }
        });
        
        // Если загрузка идёт, показываем прогресс
        let checkInterval = setInterval(() => {
            if (audio.buffered.length > 0) {
                const buffered = audio.buffered.end(0);
                const duration = audio.duration || 1;
                progress = Math.min((buffered / duration) * 100, 100);
                progressBar.style.width = progress + '%';
            }
        }, 200);
        
        // ============================================================
        // 3. НАСТРОЙКИ SUPABASE
        // ============================================================
        const SUPABASE_URL = 'https://xzraipvexmgxmixjrkdj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_UHM3a7u9rKD-_KS6n5fBUw_4zBHqaAh';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================================
        // 4. АВТОРИЗАЦИЯ
        // ============================================================
        function openAuth() {
            document.getElementById('authOverlay').classList.add('active');
            document.getElementById('authError').classList.remove('show');
            document.getElementById('authSuccess').classList.remove('show');
        }
        
        function closeAuth() {
            document.getElementById('authOverlay').classList.remove('active');
        }
        
        function showError(message) {
            const el = document.getElementById('authError');
            document.getElementById('authSuccess').classList.remove('show');
            el.textContent = message;
            el.classList.add('show');
        }
        
        function showSuccess(message) {
            const el = document.getElementById('authSuccess');
            document.getElementById('authError').classList.remove('show');
            el.textContent = message;
            el.classList.add('show');
        }
        
        function hideMessages() {
            document.getElementById('authError').classList.remove('show');
            document.getElementById('authSuccess').classList.remove('show');
        }
        
        function switchTab(tab) {
            hideMessages();
            
            const tabs = document.querySelectorAll('.auth-tab');
            tabs.forEach(el => el.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }
        
        // ============================================================
        // 5. РЕГИСТРАЦИЯ
        // ============================================================
        async function handleRegister(event) {
            event.preventDefault();
            hideMessages();
            
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (!username) {
                showError('❌ Введите никнейм');
                return;
            }
            
            if (username.length < 3) {
                showError('❌ Никнейм минимум 3 символа');
                return;
            }
            
            if (password.length < 6) {
                showError('❌ Пароль минимум 6 символов');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('❌ Пароли не совпадают');
                return;
            }
            
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '⏳...';
            
            try {
                const { data: existing, error: checkError } = await supabaseClient
                    .from('users')
                    .select('username')
                    .eq('username', username);
                
                if (checkError) {
                    throw new Error('❌ Ошибка: ' + checkError.message);
                }
                
                if (existing && existing.length > 0) {
                    throw new Error('❌ Никнейм занят');
                }
                
                const { error: insertError } = await supabaseClient
                    .from('users')
                    .insert({
                        username: username,
                        password: password
                    });
                
                if (insertError) {
                    throw new Error('❌ Ошибка: ' + insertError.message);
                }
                
                showSuccess('✅ Регистрация успешна!');
                
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirmPassword').value = '';
                
                setTimeout(() => {
                    switchTab('login');
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = '';
                    hideMessages();
                }, 1500);
                
            } catch (error) {
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Зарегистрироваться';
            }
        }
        
        // ============================================================
        // 6. ВХОД
        // ============================================================
        async function handleLogin(event) {
            event.preventDefault();
            hideMessages();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showError('❌ Введите данные');
                return;
            }
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '⏳...';
            
            try {
                const { data: user, error } = await supabaseClient
                    .from('users')
                    .select('id, username, balance')
                    .eq('username', username)
                    .eq('password', password);
                
                if (error) {
                    throw new Error('❌ Ошибка: ' + error.message);
                }
                
                if (!user || user.length === 0) {
                    throw new Error('❌ Неверный никнейм или пароль');
                }
                
                localStorage.setItem('current_user', username);
                localStorage.setItem('user_id', user[0].id);
                localStorage.setItem('user_balance', user[0].balance || 1000);
                
                showSuccess('✅ Добро пожаловать!');
                
                setTimeout(() => {
                    closeAuth();
                    showDashboard(username);
                }, 500);
                
            } catch (error) {
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }
        
        // ============================================================
        // 7. DASHBOARD
        // ============================================================
        function showDashboard(username) {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            document.getElementById('username').textContent = username;
            document.getElementById('balance').textContent = localStorage.getItem('user_balance') || 1000;
            
            // Выключаем музыку
            audio.pause();
        }
        
        function logout() {
            localStorage.removeItem('current_user');
            localStorage.removeItem('user_id');
            localStorage.removeItem('user_balance');
            
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('mainContent').style.display = 'block';
            
            // Включаем музыку обратно
            audio.play().catch(() => {});
        }
        
        // ============================================================
        // 8. ПРОВЕРКА АВТОРИЗАЦИИ
        // ============================================================
        (function checkAuth() {
            const user = localStorage.getItem('current_user');
            if (user) {
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                document.getElementById('username').textContent = user;
                document.getElementById('balance').textContent = localStorage.getItem('user_balance') || 1000;
                audio.pause();
            }
        })();
    </script>
</body>
</html>
